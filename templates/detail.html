<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Detail Klaster {{ cluster_id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">
    <div class="container bg-white p-4 shadow rounded">
        <h3>Daftar Konsumen: Klaster {{ cluster_id }}</h3>
        <hr>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Nama Konsumen</th>
                    <th>Motor</th>
                    <th>Metode Bayar</th>
                </tr>
            </thead>
            <tbody>
                {% for row in data %}
                <tr>
                    <td>{{ row.nama_konsumen }}</td>
                    <td>{{ row.nama_motor }}</td>
                    <td>{{ row.jenis_beli }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button onclick="window.close()" class="btn btn-danger">Tutup Halaman</button>
    </div>
</body>
</html>
