<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login | Wahana Honda Ciputat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #e60012 0%, #a8000d 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card { 
            width: 100%; 
            max-width: 400px; 
            padding: 2.5rem; 
            border-radius: 20px; 
            background: #ffffff; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
        }
        .logo { max-width: 180px; margin-bottom: 25px; }
        .btn-honda { background-color: #e60012; color: white; border: none; font-weight: bold; }
        .btn-honda:hover { background-color: #c40010; color: white; }
        .form-control:focus { border-color: #e60012; box-shadow: 0 0 0 0.25rem rgba(230, 0, 18, 0.25); }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo Wahana Honda" class="logo">
        <h4 class="mb-4 text-dark">Sistem Segmentasi Pelanggan</h4>
        
        <form action="/login" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label text-muted">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label text-muted">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>
            <button type="submit" class="btn btn-honda btn-lg w-100">LOGIN</button>
        </form>
        <p class="mt-3 text-muted small">&copy; 2026 Wahana Honda Ciputat</p>
    </div>
</body>
</html>
